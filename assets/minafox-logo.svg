<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">MinaFox logo</title>
  <desc id="desc">A cute pink and purple fox curled around a glossy browser orb.</desc>
  <defs>
    <radialGradient id="orb" cx="42%" cy="32%" r="68%">
      <stop offset="0" stop-color="#ff7adf"/>
      <stop offset="0.45" stop-color="#d735d8"/>
      <stop offset="1" stop-color="#6726c9"/>
    </radialGradient>
    <linearGradient id="tail" x1="20%" y1="8%" x2="85%" y2="95%">
      <stop offset="0" stop-color="#ff579b"/>
      <stop offset="0.42" stop-color="#ff7cc7"/>
      <stop offset="0.72" stop-color="#c66cff"/>
      <stop offset="1" stop-color="#6b44df"/>
    </linearGradient>
    <linearGradient id="fur" x1="22%" y1="5%" x2="72%" y2="75%">
      <stop offset="0" stop-color="#ff4f95"/>
      <stop offset="0.52" stop-color="#ff86bf"/>
      <stop offset="1" stop-color="#bd4ded"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff6ff"/>
      <stop offset="1" stop-color="#ffd2f0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#4e168c" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- outer browser-like swirl / tail, original MinaFox shape -->
    <path d="M161 560c-38-188 95-348 272-397 102-28 232-2 308 83 92 103 105 249 36 362 91-70 118-182 73-291 108 95 126 250 39 383-118 181-365 233-552 117 122 45 280 13 385-80-128 49-303 22-413-72-80-68-122-130-148-105z" fill="url(#tail)"/>
    <path d="M788 595c-104 68-212 69-321 31-104-36-202-25-271 67 59-169 227-222 382-160 92 37 159 29 210 62z" fill="#fff0fb" opacity="0.88"/>

    <!-- globe/orb -->
    <circle cx="512" cy="592" r="190" fill="url(#orb)" stroke="#5a169b" stroke-width="16"/>
    <path d="M361 565c105-56 210-54 315-2M378 668c87-35 178-30 268 8M514 407c-33 98-34 219-3 366M651 469c-88 62-156 144-198 248" fill="none" stroke="#ffbef1" stroke-width="8" opacity="0.62"/>
    <g fill="#fff8ff">
      <circle cx="512" cy="590" r="12"/><circle cx="583" cy="492" r="10"/><circle cx="430" cy="626" r="10"/><circle cx="667" cy="674" r="8"/>
    </g>

    <!-- head and ears -->
    <path d="M240 226c86-46 183-21 238 55 68-43 178-34 245 30 58 55 63 144 16 206-82 109-311 119-432 28-118-88-137-230-67-319z" fill="url(#fur)"/>
    <path d="M243 226c-70-4-118 23-132 43 18 89 74 143 144 154 12-67 27-132-12-197z" fill="url(#fur)" stroke="#a31a96" stroke-width="10"/>
    <path d="M599 132c-73 34-110 96-121 158 65 13 126 5 177-40-2-50-21-92-56-118z" fill="url(#fur)" stroke="#a31a96" stroke-width="10"/>
    <path d="M157 279c36-18 74-17 108 5-8 44-20 82-39 111-35-18-58-57-69-116z" fill="#ffc6f3"/>
    <path d="M586 176c23 25 34 55 34 90-34 22-70 29-109 20 16-45 40-82 75-110z" fill="#ffd9fa"/>

    <!-- muzzle / cheeks -->
    <path d="M262 454c100 67 293 72 410-6-36 99-161 146-286 118-75-17-121-54-124-112z" fill="url(#cream)"/>
    <path d="M430 426c-23 8-43 8-61 0 13-24 48-24 61 0z" fill="#fff5ff"/>
    <path d="M520 365c-15 28-32 43-53 45 2-33 21-55 53-45z" fill="#fff5ff"/>

    <!-- eyes -->
    <ellipse cx="357" cy="417" rx="48" ry="60" fill="#341052"/>
    <ellipse cx="357" cy="424" rx="31" ry="42" fill="#b733c7"/>
    <circle cx="342" cy="388" r="14" fill="#fff"/><circle cx="377" cy="446" r="8" fill="#fff"/>
    <ellipse cx="548" cy="392" rx="48" ry="60" fill="#341052"/>
    <ellipse cx="548" cy="399" rx="31" ry="42" fill="#b733c7"/>
    <circle cx="531" cy="362" r="14" fill="#fff"/><circle cx="568" cy="423" r="8" fill="#fff"/>

    <!-- nose/mouth -->
    <path d="M456 466c18-18 43-17 58 0-12 18-42 19-58 0z" fill="#c61b78"/>
    <path d="M485 481c-2 20-20 29-38 19M486 481c8 20 30 27 45 11" fill="none" stroke="#8d176b" stroke-width="8" stroke-linecap="round"/>

    <!-- paws -->
    <path d="M300 539c-5-58 35-87 83-64 37 18 41 70 6 101-35 31-84 11-89-37z" fill="#ff72aa"/>
    <path d="M631 478c-7-54 28-85 76-64 44 20 52 77 15 108-35 30-84 7-91-44z" fill="#ff72aa"/>

    <!-- sparkles -->
    <g fill="#fff8ff" opacity="0.94">
      <circle cx="824" cy="449" r="14"/><circle cx="847" cy="504" r="7"/><circle cx="150" cy="626" r="10"/><circle cx="812" cy="276" r="9"/>
    </g>
  </g>
</svg>
