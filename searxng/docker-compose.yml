services:
  searxng:
    build:
      context: .
    image: minafox/searxng:local
    container_name: minafox-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      - BASE_URL=http://127.0.0.1:8888/
      - INSTANCE_NAME=MinaFox SearXNG
    volumes:
      - ${MINAFOX_SEARXNG_SETTINGS:-./settings.yml}:/etc/searxng/settings.yml:ro
      - ./uwsgi.ini:/etc/searxng/uwsgi.ini:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=128m,mode=1777
