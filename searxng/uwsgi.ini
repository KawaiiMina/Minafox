[uwsgi]
# Minimal SearXNG uWSGI config for the local MinaFox container.
socket = /tmp/searxng.sock
chmod-socket = 666
http = 0.0.0.0:8080
module = searx.webapp
callable = app
uid = searxng
gid = searxng
workers = 2
threads = 4
master = true
lazy-apps = true
disable-logging = true
buffer-size = 8192
add-header = Connection: close
